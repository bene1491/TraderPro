services:
  - type: web
    name: traderpro-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      # After deploying to Vercel, replace with your actual Vercel URL
      # Multiple origins: comma-separated, e.g. https://foo.vercel.app,https://bar.vercel.app
      - key: ALLOWED_ORIGINS
        value: https://your-app.vercel.app
    plan: free
